name: Release

# Publishes to Modrinth + GitHub Releases when you push a version tag, e.g. `v1.0.1`.
#
# Release flow:
#   1. Bump `mod_version` in gradle.properties (must match the tag, without the leading `v`).
#   2. Commit to main.
#   3. git tag v1.0.1 && git push origin v1.0.1
#
# To publish on every push to main instead, replace the `on:` block with:
#   on:
#     push:
#       branches: [ main ]
# (remember: Modrinth rejects duplicate versions, so bump mod_version every time.)

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # create the GitHub Release and attach the jar

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Publish to Modrinth & GitHub Releases
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # ── Modrinth ────────────────────────────────────────────────
          modrinth-id: CHANGEME_MODRINTH_PROJECT_ID
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # ── GitHub Release (auto-provided token) ────────────────────
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # ── Artifact: primary mod jar only (skip dev/sources) ───────
          files: "build/libs/!(*-@(dev|sources|javadoc)).jar"

          # ── Metadata ────────────────────────────────────────────────
          name: Foundry ${{ github.ref_name }}
          version-type: release
          loaders: fabric
          game-versions: 26.1.2
          dependencies: |
            fabric-api(required)
